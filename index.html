<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pro Calculator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <div class="calculator">

    <div class="display">
      <div id="history"></div>
      <input type="text" id="output" disabled>
    </div>

    <div class="buttons">
      <button class="btn gray" onclick="clearAll()">AC</button>
      <button class="btn gray" onclick="deleteLast()">⌫</button>
      <button class="btn gray" onclick="append('%')">%</button>
      <button class="btn orange" onclick="append('/')">÷</button>

      <button class="btn" onclick="append('7')">7</button>
      <button class="btn" onclick="append('8')">8</button>
      <button class="btn" onclick="append('9')">9</button>
      <button class="btn orange" onclick="append('*')">×</button>

      <button class="btn" onclick="append('4')">4</button>
      <button class="btn" onclick="append('5')">5</button>
      <button class="btn" onclick="append('6')">6</button>
      <button class="btn orange" onclick="append('-')">−</button>

      <button class="btn" onclick="append('1')">1</button>
      <button class="btn" onclick="append('2')">2</button>
      <button class="btn" onclick="append('3')">3</button>
      <button class="btn orange" onclick="append('+')">+</button>

      <button class="btn zero" onclick="append('0')">0</button>
      <button class="btn" onclick="append('.')">.</button>
      <button class="btn equal" onclick="calculate()">=</button>
    </div>

  </div>

  <!-- History Panel -->
  <div class="history-box">
    <h3>History</h3>
    <ul id="historyList"></ul>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
